name: Extract ZIP

on:
  push:
    branches:
      - main

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract data.zip
        run: |
          ls -la
          if [ -f "data.zip" ]; then
            echo "找到 data.zip，开始解压..."
            unzip -o data.zip
            rm data.zip
            echo "解压完成，已删除 zip"
          else
            echo "未找到 data.zip"
          fi
      - name: List files after extraction
        run: ls -la
